name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI + Android workloads
        run: dotnet workload install maui android --ignore-failed-sources

      - name: Verify secrets presence
        shell: pwsh
        run: |
          if ("${{ secrets.ANDROID_KEYSTORE_BASE64 }}" -eq "") { throw "ANDROID_KEYSTORE_BASE64 is empty or missing" }
          if ("${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" -eq "") { throw "ANDROID_KEYSTORE_PASSWORD is empty or missing" }
          if ("${{ secrets.ANDROID_KEY_ALIAS }}" -eq "") { throw "ANDROID_KEY_ALIAS is empty or missing" }
          if ("${{ secrets.ANDROID_KEY_PASSWORD }}" -eq "") { throw "ANDROID_KEY_PASSWORD is empty or missing" }

      - name: Decode keystore
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes(
            "$env:GITHUB_WORKSPACE\android-signing.keystore",
            [Convert]::FromBase64String("${{ secrets.ANDROID_KEYSTORE_BASE64 }}")
          )

      - name: Publish signed Release APK
        shell: pwsh
        run: >
          dotnet publish XerSize.csproj
          -f net10.0-android
          -c Release
          -p:AndroidPackageFormats=apk
          -p:AndroidKeyStore=true
          -p:AndroidSigningKeyStore="$env:GITHUB_WORKSPACE\android-signing.keystore"
          -p:AndroidSigningStorePass="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          -p:AndroidSigningKeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}"
          -p:AndroidSigningKeyPass="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: XerSize-android-release-apk
          path: |
            **/bin/Release/net10.0-android/**/*.apk
